<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playlists | Distrito 110</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --card-bg: #1f2833;
            --text-color: #c5c6c7;
            --main-accent: #66fcf1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 40px;
            border-bottom: 1px solid var(--card-bg);
            padding-bottom: 20px;
        }

        h1 {
            color: #ffffff;
            margin: 0;
            font-size: 2.3rem;
            letter-spacing: 1px;
        }

        h1 span {
            color: var(--main-accent);
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1200px;
        }

        .playlist-card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
            border: 1px solid transparent;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .playlist-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        }

        .cover-art {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: linear-gradient(135deg, #151a21, #000000);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4.5rem;
            position: relative;
        }

        .quadrant-tag {
            position: absolute;
            top: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .playlist-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .playlist-title {
            color: #ffffff;
            margin: 0 0 8px 0;
            font-size: 1.3rem;
        }

        .playlist-desc {
            font-size: 0.9rem;
            color: #a4a7ab;
            margin: 0 0 20px 0;
            line-height: 1.4;
        }

        .btn-open {
            display: block;
            background-color: transparent;
            padding: 10px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-align: center;
        }
    </style>
</head>
<body>

    <header>
        <h1>Distrito 110 // <span>Playlists</span></h1>
    </header>

    <div class="grid-container" id="playlist-grid"></div>

    <!-- Vinculación directa a tu script unificado de Aisha con las 4 playlists -->
    <script src="script.js"></script>
</body>
</html>
